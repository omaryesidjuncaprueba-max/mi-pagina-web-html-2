<!DOCTYPE html>
<html>
<head>
<title>Registro de Usuario</title>
</head>
<body>
<h1>Registro de Usuario</h1>
<form>
    <div>
  <label for="nombre">Nombre Completo:</label>
  <input type="text" id="nombre" name="nombre" required>
    </div>
    <div>
  <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
  <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
    </div>
    <div>
  <label for="telefono">Número de Teléfono:</label>
  <input type="tel" id="telefono" name="telefono" required>
    </div>
    <div>
  <label for="email">Correo Electrónico:</label>
  <input type="email" id="email" name="email" required>
    </div>
  <label for="intereses">¿Cuáles son tus intereses?</label>
  <div>
    <input type="checkbox" id="interes-informatica" name="intereses[]" value="Informática">
    <label for="interes-informatica">Informática</label>
    <input type="checkbox" id="interes-musica" name="intereses[]" value="Música">
    <label for="interes-musica">Música</label>
    <input type="checkbox" id="interes-arte-grafico" name="intereses[]" value="Arte Gráfico">
    <label for="interes-arte-grafico">Arte Gráfico</label>
    <input type="checkbox" id="interes-television" name="intereses[]" value="Televisión">
    <label for="interes-television">Televisión</label>
  </div>

  <label for="experiencia">Describe tu Experiencia Laboral:</label>
  <textarea id="experiencia" name="experiencia" rows="3"></textarea>

  <button type="submit">Registrarse</button>
</form>
</body>
</html>
